<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luma Dashboard - Cogs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body data-page="cogs">
    <div class="app">
        <aside class="sidebar">
            <div class="logo">Luma</div>
            <nav class="nav">
                <a href="/dashboard/servers">Servers</a>
                <a href="/dashboard/overview">Overview</a>
                <a href="/dashboard/moderation">Moderation</a>
                <a href="/dashboard/guild-settings">Guild Settings</a>
                <a class="active" href="/dashboard/cogs">Cogs</a>
            </nav>
            <div class="user-box" id="session-user">Signed in...</div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div>
                    <h1 class="title">Cog Manager</h1>
                    <p class="subtitle">Enable and disable modules per guild.</p>
                </div>
                <div class="actions">
                    <select id="guild-select"></select>
                    <a class="btn" href="/auth/logout">Logout</a>
                </div>
            </header>

            <section class="section">
                <h2>Module Toggles</h2>
                <p class="lead">Changes are applied to the currently selected guild.</p>
                <div id="cogs-list" class="cogs-list"></div>

                <div style="margin-top: 0.9rem; display:flex; justify-content:space-between; gap:0.7rem; flex-wrap:wrap;">
                    <button class="btn danger" id="reset-guild">Reset Current Guild</button>
                    <button class="btn primary" id="save-cogs">Save Cogs</button>
                </div>
            </section>
        </main>
    </div>

    <div class="flash" id="flash"></div>
    <script src="/assets/dashboard.js"></script>
</body>
</html>
