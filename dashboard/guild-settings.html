<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luma Dashboard - Guild Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body data-page="guild-settings">
    <div class="app">
        <aside class="sidebar">
            <div class="logo">Luma</div>
            <nav class="nav">
                <a href="/dashboard/servers">Servers</a>
                <a href="/dashboard/overview">Overview</a>
                <a href="/dashboard/moderation">Moderation</a>
                <a class="active" href="/dashboard/guild-settings">Guild Settings</a>
                <a href="/dashboard/cogs">Cogs</a>
            </nav>
            <div class="user-box" id="session-user">Signed in...</div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div>
                    <h1 class="title">Guild Settings</h1>
                    <p class="subtitle">Control language and operational channels.</p>
                </div>
                <div class="actions">
                    <select id="guild-select"></select>
                    <a class="btn" href="/auth/logout">Logout</a>
                </div>
            </header>

            <section class="section">
                <h2>Identity and Defaults</h2>
                <p class="lead">These values are saved per selected guild.</p>

                <div class="field">
                    <label for="guild-name">Guild name</label>
                    <input id="guild-name" type="text">
                </div>

                <div class="field">
                    <label for="guild-language">Language</label>
                    <select id="guild-language">
                        <option value="pt">Portuguese</option>
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                    </select>
                </div>

                <div class="field">
                    <label for="guild-log">Log channel</label>
                    <input id="guild-log" type="text" placeholder="#moderation-log">
                </div>

                <div style="margin-top: 0.9rem; display:flex; justify-content:flex-end;">
                    <button class="btn primary" id="save-guild">Save Guild Settings</button>
                </div>
            </section>
        </main>
    </div>

    <div class="flash" id="flash"></div>
    <script src="/assets/dashboard.js"></script>
</body>
</html>
