<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luma — Territories</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard/style.css">
</head>
<body>

<a class="back-link" href="/dashboard/overview">&#8592; Voltar ao Dashboard</a>

<!-- HUD -->
<div class="hud">
    <div class="hud-zone">
        <span class="zone-icon">🗺</span>
        <div>
            <div class="zone-name"></div>
            <div class="zone-sub"></div>
        </div>
    </div>

    <div class="hud-spacer"></div>

    <div class="hud-players">
        <div class="player-dot"></div>
        <span id="playerCount">—</span>&nbsp;jogadores aliados
    </div>

    <div class="hud-spacer"></div>

    <div class="hud-wallet">
        <span class="wallet-icon">🪙</span>
        <span id="walletBalance">—</span>
    </div>

    <div class="hud-spacer"></div>

    <div class="hud-resources"></div>
</div>

<!-- Map viewport with navigation -->
<div class="map-viewport">

    <!-- Nav arrows -->
    <div class="map-nav left disabled" id="navLeft">&#8592;</div>
    <div class="map-nav right" id="navRight">&#8594;</div>

    <!-- Map dots -->
    <div class="map-dots" id="mapDots"></div>

    <!-- First slide (active) -->
    <div class="map-slide active">
        <canvas id="mapCanvas"></canvas>
        <div class="tooltip" id="tooltip"></div>
    </div>

    <!-- Info panel (shared, overlaid) -->
    <div class="info-panel" id="infoPanel">
        <div class="panel-header">
            <div class="panel-dot" id="panelDot"></div>
            <span class="panel-name" id="panelName">—</span>
        </div>
        <div class="panel-row"><span class="lbl">Proprietário</span><span class="val" id="panelOwner">—</span></div>
        <div class="panel-row"><span class="lbl">Defesa</span><span class="val" id="panelDefense">—</span></div>
        <div class="panel-row"><span class="lbl">Luma Coins</span><span class="val" id="panelCoins">—</span></div>
        <div class="panel-row"><span class="lbl">Status</span><span class="val" id="panelStatus">—</span></div>
        <div class="panel-row"><span class="lbl">Ação do dono</span><span class="val" id="panelOwnerAction">—</span></div>
        <button class="btn btn-attack"  id="btnAttack">&#9876; Atacar Território</button>
        <button class="btn btn-capture" id="btnCapture">&#127988; Capturar</button>
        <button class="btn btn-collect" id="btnCollect">💰 Coletar Recompensa</button>
        <button class="btn btn-refresh" id="btnRefresh">↻ Atualizar Mapa</button>
    </div>
</div>

    <div class="flash" id="flash"></div>

    <script src="/dashboard/scripts/map.js"></script>
    <script src="/dashboard/scripts/ui.js"></script>
</body>
</html>
